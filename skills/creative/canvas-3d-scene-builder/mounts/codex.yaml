interface:
  display_name: "canvas-3d-scene-builder"
  short_description: "Build interactive 3D scene/staging tools as single-file HTML apps using Canvas 2D — no Three.js. Covers perspective projection, orbit controls, hit testing, depth-sorted rendering, and 3D shape drawing (boxes, cylinders, panels). Use when the user asks for a visual director console, staging tool, 3D layout editor, or any interactive 3D scene in a browser without dependencies."
  default_prompt: "Use $canvas-3d-scene-builder to help with canvas 3d scene builder tasks."
policy:
  allow_implicit_invocation: true
